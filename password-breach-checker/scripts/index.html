<meta charset="UTF-8">

<title>Password Breach Checker</title>
<script>
/**
 * Embedded zxcvbn-lite: Simplified password strength estimator.
 * Provides pattern detection, entropy calculation, and crack time estimates.
 * This is a lightweight inline implementation — not the full zxcvbn library,
 * but follows similar scoring methodology.
 */
const zxcvbnLite = (function() {
  // Common passwords list (top ~200 most common)
  const COMMON_PASSWORDS = new Set([
    'password','123456','12345678','qwerty','abc123','monkey','1234567','letmein',
    'trustno1','dragon','baseball','iloveyou','master','sunshine','ashley','bailey',
    'passw0rd','shadow','123456789','1234567890','000000','football','charlie','access',
    'hello','thunder','fuckyou','batman','admin','welcome','login','princess','qwerty123',
    'password1','password123','1q2w3e4r','654321','superman','p@ssw0rd','michael',
    'ninja','mustang','jessica','letmein1','computer','starwars','121212','george',
    'asshole','fuckyou1','1qaz2wsx','qazwsx','zxcvbn','asdfgh','987654321','111111',
    '123123','1234','12345','12345678910','696969','abcdef','abc1234','austin','brandi',
    'camaro','carolina','chelsea','chicken','corvette','dallas','daniel','diamond',
    'edward','falcon','freedom','fucker','fucking','gandalf','ginger','hammer',
    'harley','hannah','hunter','iceman','jackson','jordan','joshua','killer',
    'knight','legend','liverpool','london','madison','marina','martin','matthew',
    'mercedes','michelle','midnight','milan','murphy','orange','pepper','phantom',
    'player','ranger','rachel','robert','rodeo','ruger','samantha','samurai',
    'scooter','serenity','sierra','sparky','steven','summer','taylor','test',
    'thomas','tiger','tigger','tommy','trustno1','victoria','viking','whatever',
    'wilson','winter','wizard','yankees','test123','root','toor','pass','guest'
  ]);

  const KEYBOARD_PATTERNS = ['qwerty','qwertz','asdf','zxcv','qazwsx','1qaz2wsx','!qaz2wsx','1q2w3e','qweasd'];
  const DATE_PATTERNS = [/19\d{2}|20\d{2}/, /\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}/];

  function calculateEntropy(password) {
    let charsetSize = 0;
    if (/[a-z]/.test(password)) charsetSize += 26;
    if (/[A-Z]/.test(password)) charsetSize += 26;
    if (/[0-9]/.test(password)) charsetSize += 10;
    if (/[^a-zA-Z0-9]/.test(password)) charsetSize += 33;
    if (charsetSize === 0) return 0;
    return password.length * Math.log2(charsetSize);
  }

  function detectPatterns(password) {
    const patterns = [];
    const lower = password.toLowerCase();

    // Common password check
    if (COMMON_PASSWORDS.has(lower)) {
      patterns.push({ type: 'common_password', penalty: 0.9 });
    }

    // Keyboard patterns
    for (const kp of KEYBOARD_PATTERNS) {
      if (lower.includes(kp)) {
        patterns.push({ type: 'keyboard_pattern', penalty: 0.6 });
        break;
      }
    }

    // Repeated characters (aaa, 111)
    if (/(.)\1{2,}/.test(password)) {
      patterns.push({ type: 'repeated_chars', penalty: 0.4 });
    }

    // Sequential characters (abc, 123)
    let seqCount = 0;
    for (let i = 0; i < password.length - 2; i++) {
      const c1 = password.charCodeAt(i);
      const c2 = password.charCodeAt(i + 1);
      const c3 = password.charCodeAt(i + 2);
      if ((c2 === c1 + 1 && c3 === c2 + 1) || (c2 === c1 - 1 && c3 === c2 - 1)) {
        seqCount++;
      }
    }
    if (seqCount > 0) {
      patterns.push({ type: 'sequential_chars', penalty: 0.3 + Math.min(seqCount * 0.1, 0.4) });
    }

    // Date patterns
    for (const dp of DATE_PATTERNS) {
      if (dp.test(password)) {
        patterns.push({ type: 'date_pattern', penalty: 0.3 });
        break;
      }
    }

    // All same case
    if (password.length > 3 && (password === lower || password === password.toUpperCase())) {
      patterns.push({ type: 'single_case', penalty: 0.15 });
    }

    // All digits
    if (/^\d+$/.test(password)) {
      patterns.push({ type: 'digits_only', penalty: 0.5 });
    }

    return patterns;
  }

  function estimateCrackTime(entropy) {
    // Assume 10 billion guesses/sec (offline GPU attack)
    const guessesPerSec = 1e10;
    const totalGuesses = Math.pow(2, entropy);
    const seconds = totalGuesses / guessesPerSec / 2; // average is half the keyspace

    function formatTime(s) {
      if (s < 1) return 'Instant';
      if (s < 60) return Math.ceil(s) + ' seconds';
      if (s < 3600) return Math.ceil(s / 60) + ' minutes';
      if (s < 86400) return Math.ceil(s / 3600) + ' hours';
      if (s < 86400 * 30) return Math.ceil(s / 86400) + ' days';
      if (s < 86400 * 365) return Math.ceil(s / (86400 * 30)) + ' months';
      if (s < 86400 * 365 * 100) return Math.ceil(s / (86400 * 365)) + ' years';
      if (s < 86400 * 365 * 1e6) return Math.ceil(s / (86400 * 365 * 100)) + ' centuries';
      if (s < 86400 * 365 * 1e9) return Math.ceil(s / (86400 * 365 * 1e6)) + ' million years';
      return ' billions of years+';
    }

    return {
      online_throttled: formatTime(totalGuesses / 100 / 2),       // 100 guesses/sec (online throttled)
      online_unthrottled: formatTime(totalGuesses / 1000 / 2),     // 1K guesses/sec
      offline_fast: formatTime(seconds),
      offline_slow_hash: formatTime(totalGuesses / 1e4 / 2)        // 10K guesses/sec (bcrypt)
    };
  }

  function score(password) {
    if (!password || password.length === 0) {
      return { score: 0, entropy: 0, patterns: [], crackTimes: {}, feedback: { warning: 'Enter a password', suggestions: ['Use a password of at least 12 characters'] } };
    }

    const patterns = detectPatterns(password);
    let entropy = calculateEntropy(password);

    // Apply pattern penalties
    for (const p of patterns) {
      entropy *= (1 - p.penalty);
    }

    // Length bonus
    if (password.length >= 16) entropy += 12;
    else if (password.length >= 12) entropy += 6;

    // Map entropy to score (0-4)
    let score;
    if (entropy < 20) score = 0;       // Very weak
    else if (entropy < 40) score = 1;  // Weak
    else if (entropy < 60) score = 2;  // Fair
    else if (entropy < 80) score = 3;  // Strong
    else score = 4;                     // Very strong

    const crackTimes = estimateCrackTime(entropy);

    // Feedback
    let warning = '';
    const suggestions = [];
    if (patterns.find(p => p.type === 'common_password')) {
      warning = 'This is a commonly used password';
      suggestions.push('Choose a password not found in common password lists');
    }
    if (password.length < 8) {
      suggestions.push('Use at least 8 characters, ideally 12+');
    }
    if (!/[A-Z]/.test(password)) suggestions.push('Add uppercase letters');
    if (!/[a-z]/.test(password)) suggestions.push('Add lowercase letters');
    if (!/[0-9]/.test(password)) suggestions.push('Add numbers');
    if (!/[^a-zA-Z0-9]/.test(password)) suggestions.push('Add special characters');
    if (patterns.find(p => p.type === 'keyboard_pattern')) {
      suggestions.push('Avoid keyboard patterns like qwerty, asdf');
    }
    if (patterns.find(p => p.type === 'repeated_chars')) {
      suggestions.push('Avoid repeated characters');
    }
    if (patterns.find(p => p.type === 'sequential_chars')) {
      suggestions.push('Avoid sequential characters (abc, 123)');
    }

    return { score, entropy: Math.round(entropy * 10) / 10, patterns, crackTimes, feedback: { warning, suggestions } };
  }

  return { score };
})();

/**
 * SHA-1 hash function (inline implementation for HIBP k-anonymity check).
 * Uses the Web Crypto API when available, falls back to pure JS implementation.
 */
async function sha1Hash(str) {
  if (typeof crypto !== 'undefined' && crypto.subtle) {
    const buffer = new TextEncoder().encode(str);
    const hashBuffer = await crypto.subtle.digest('SHA-1', buffer);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
  }
  // Pure JS SHA-1 fallback
  function rotateLeft(n, s) { return ((n << s) | (n >>> (32 - s))) & 0xFFFFFFFF; }
  function toHexStr(n) { return (n >>> 0).toString(16).padStart(8, '0'); }
  function utf8Encode(str) {
    const encoded = [];
    for (let i = 0; i < str.length; i++) {
      let c = str.charCodeAt(i);
      if (c < 128) encoded.push(c);
      else if (c < 2048) { encoded.push(192 | (c >> 6), 128 | (c & 63)); }
      else { encoded.push(224 | (c >> 12), 128 | ((c >> 6) & 63), 128 | (c & 63)); }
    }
    return encoded;
  }

  const msg = utf8Encode(str);
  msg.push(0x80);
  while (msg.length % 64 !== 56) msg.push(0);
  const origLen = str.length * 8;
  msg.push(0, 0, 0, 0);
  msg.push((origLen / 0x100000000) >>> 0, ((origLen / 0x10000) >>> 0) & 0xFF, ((origLen / 0x100) >>> 0) & 0xFF, origLen & 0xFF);

  let h0 = 0x67452301, h1 = 0xEFCDAB89, h2 = 0x98BADCFE, h3 = 0x10325476, h4 = 0xC3D2E1F0;

  for (let offset = 0; offset < msg.length; offset += 64) {
    const w = [];
    for (let i = 0; i < 16; i++) {
      w[i] = (msg[offset + i * 4] << 24) | (msg[offset + i * 4 + 1] << 16) | (msg[offset + i * 4 + 2] << 8) | msg[offset + i * 4 + 3];
    }
    for (let i = 16; i < 80; i++) {
      w[i] = rotateLeft(w[i - 3] ^ w[i - 8] ^ w[i - 14] ^ w[i - 16], 1);
    }
    let a = h0, b = h1, c = h2, d = h3, e = h4;
    for (let i = 0; i < 80; i++) {
      let f, k;
      if (i < 20) { f = (b & c) | (~b & d); k = 0x5A827999; }
      else if (i < 40) { f = b ^ c ^ d; k = 0x6ED9EBA1; }
      else if (i < 60) { f = (b & c) | (b & d) | (c & d); k = 0x8F1BBCDC; }
      else { f = b ^ c ^ d; k = 0xCA62C1D6; }
      const temp = (rotateLeft(a, 5) + f + e + k + w[i]) & 0xFFFFFFFF;
      e = d; d = c; c = rotateLeft(b, 30); b = a; a = temp;
    }
    h0 = (h0 + a) & 0xFFFFFFFF;
    h1 = (h1 + b) & 0xFFFFFFFF;
    h2 = (h2 + c) & 0xFFFFFFFF;
    h3 = (h3 + d) & 0xFFFFFFFF;
    h4 = (h4 + e) & 0xFFFFFFFF;
  }
  return toHexStr(h0) + toHexStr(h1) + toHexStr(h2) + toHexStr(h3) + toHexStr(h4);
}

/**
 * Check password against HIBP API using k-anonymity model.
 * Only the first 5 characters of the SHA-1 hash are sent to the API.
 * The full hash is never transmitted.
 */
async function checkHIBP(password) {
  try {
    const hash = await sha1Hash(password);
    const prefix = hash.substring(0, 5);
    const suffix = hash.substring(5);

    const response = await fetch(`https://api.pwnedpasswords.com/range/${prefix}`, {
      headers: { 'Add-Padding': 'true' }
    });

    if (!response.ok) {
      return { error: `HIBP API returned ${response.status}`, breachCount: -1 };
    }

    const text = await response.text();
    const lines = text.split('\n');
    for (const line of lines) {
      const parts = line.trim().split(':');
      if (parts.length === 2 && parts[0] === suffix) {
        return { breachCount: parseInt(parts[1], 10) };
      }
    }
    return { breachCount: 0 };
  } catch (err) {
    return { error: `Network error: ${err.message}`, breachCount: -1 };
  }
}

/**
 * Check email against HIBP breach API.
 */
async function checkEmailBreach(email) {
  try {
    // HIBP requires an API key for the breachedaccount endpoint
    // We'll use the public breach check approach
    const response = await fetch(`https://haveibeenpwned.com/api/v3/breachedaccount/${encodeURIComponent(email)}?truncateResponse=true`, {
      headers: {
        'user-agent': 'AI-Edge-Gallery-Password-Checker',
        'hibp-api-key': '' // Free tier requires API key; we handle gracefully
      }
    });

    if (response.status === 200) {
      const breaches = await response.json();
      return { breachCount: breaches.length, breaches: breaches.map(b => b.Name) };
    } else if (response.status === 404) {
      return { breachCount: 0, breaches: [] };
    } else {
      return { error: `HIBP returned ${response.status}`, breachCount: -1 };
    }
  } catch (err) {
    return { error: `Email check error: ${err.message}`, breachCount: -1 };
  }
}

/**
 * Score label mapping.
 */
function scoreLabel(score) {
  return ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'][score] || 'Unknown';
}

function scoreEmoji(score) {
  return ['🔴', '🟠', '🟡', '🟢', '🟢'][score] || '⚪';
}

/**
 * Main result function — entry point for AI Edge Gallery.
 * Receives JSON data from the LLM and returns formatted result string.
 */
window['ai_edge_gallery_get_result'] = async (data) => {
  let parsed;
  if (typeof data === 'string') {
    parsed = JSON.parse(data);
  } else {
    parsed = data;
  }

  const password = parsed.password || '';
  const email = parsed.email || '';

  // --- Password Strength Analysis ---
  const strength = zxcvbnLite.score(password);

  let resultLines = [];
  resultLines.push('╔══════════════════════════════════════════════════╗');
  resultLines.push('║        🔐 PASSWORD BREACH CHECKER RESULTS       ║');
  resultLines.push('╚══════════════════════════════════════════════════╝');
  resultLines.push('');

  // Password Strength Section
  resultLines.push('── 📊 Password Strength Analysis ──');
  resultLines.push(`  Score: ${scoreEmoji(strength.score)} ${strength.score}/4 (${scoreLabel(strength.score)})`);
  resultLines.push(`  Entropy: ${strength.entropy} bits`);
  resultLines.push(`  Length: ${password.length} characters`);
  resultLines.push('');
  resultLines.push('  ⏱️ Crack Time Estimates:');
  resultLines.push(`    Online (throttled):    ${strength.crackTimes.online_throttled || 'N/A'}`);
  resultLines.push(`    Online (unthrottled):  ${strength.crackTimes.online_unthrottled || 'N/A'}`);
  resultLines.push(`    Offline (fast hash):   ${strength.crackTimes.offline_fast || 'N/A'}`);
  resultLines.push(`    Offline (slow hash):   ${strength.crackTimes.offline_slow_hash || 'N/A'}`);

  if (strength.feedback.warning) {
    resultLines.push(`  ⚠️  Warning: ${strength.feedback.warning}`);
  }
  if (strength.patterns.length > 0) {
    resultLines.push(`  🔍 Patterns detected: ${strength.patterns.map(p => p.type.replace(/_/g, ' ')).join(', ')}`);
  }
  resultLines.push('');

  // --- HIBP Breach Check ---
  resultLines.push('── 🕵️ Have I Been Pwned Check ──');
  if (password) {
    const hibpResult = await checkHIBP(password);
    if (hibpResult.error) {
      resultLines.push(`  ⚠️ Could not check: ${hibpResult.error}`);
    } else if (hibpResult.breachCount > 0) {
      resultLines.push(`  🚨 BREACHED! Found in ${hibpResult.breachCount.toLocaleString()} data breaches`);
      resultLines.push(`  ⛔ This password has been compromised. Do NOT use it.`);
    } else {
      resultLines.push('  ✅ Not found in known data breaches');
      resultLines.push('  (This does not guarantee the password has never been compromised)');
    }
  }
  resultLines.push('');

  // --- Email Breach Check ---
  if (email) {
    resultLines.push('── 📧 Email Breach Check ──');
    const emailResult = await checkEmailBreach(email);
    if (emailResult.error) {
      resultLines.push(`  ⚠️ Could not check email: ${emailResult.error}`);
      resultLines.push('  Note: Email breach checking requires an HIBP API key.');
    } else if (emailResult.breachCount > 0) {
      resultLines.push(`  🚨 Email found in ${emailResult.breachCount} breaches:`);
      if (emailResult.breaches) {
        emailResult.breaches.forEach(b => resultLines.push(`    • ${b}`));
      }
    } else {
      resultLines.push('  ✅ Email not found in known breaches');
    }
    resultLines.push('');
  }

  // --- Recommendations ---
  resultLines.push('── 💡 Recommendations ──');
  const suggestions = strength.feedback.suggestions;
  if (hibpResult && hibpResult.breachCount > 0) {
    resultLines.push('  1. 🔴 Change this password IMMEDIATELY — it has been breached');
    resultLines.push('  2. Use a unique password for every account');
    resultLines.push('  3. Enable two-factor authentication where possible');
  }
  if (strength.score < 3) {
    const offset = suggestions.length > 0 ? 1 : 0;
    suggestions.forEach((s, i) => {
      resultLines.push(`  ${i + offset + 1}. ${s}`);
    });
    resultLines.push(`  ${suggestions.length + offset + 1}. Consider using a password manager`);
    resultLines.push(`  ${suggestions.length + offset + 2}. Use passphrases (e.g., "correct-horse-battery-staple")`);
  } else {
    resultLines.push('  ✅ Password strength is good');
    resultLines.push('  • Continue using a password manager for unique passwords per site');
    resultLines.push('  • Enable two-factor authentication for critical accounts');
  }

  return JSON.stringify({ result: resultLines.join('\n') });
};
